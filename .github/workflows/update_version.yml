name: Update Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'The version bump to apply [possible values: major, minor, patch]'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      publish:
        description: 'Publish the package to GitHub releases'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - ncsa

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      VERSION: ${{ steps.update_version.outputs.tag-number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For org repos, make sure we have write access
          token: ${{ secrets.GITHUB_TOKEN }}

      # Do a version bump on the package
      - name: Update version by bumping git tag
        id: update_version
        uses: leonsteinhaeuser/git-tag-bump@v1.1.0
        with:
          args: >-
            --bump ${{ github.event.inputs.bump }} --v-prefix --create --actor-name "GitHub Actions" --actor-mail "github-actions[bot]@users.noreply.github.com"

      - name: Update pyproject.toml version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${{ steps.update_version.outputs.tag-number }}"
          VERSION_NO_V="${VERSION#v}"
          
          # Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Update version in pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION_NO_V\"/" pyproject.toml
          
          # Commit the version update
          git add pyproject.toml
          git commit -m "Update version to $VERSION_NO_V"
          git push

  build-and-publish:
    runs-on: ubuntu-latest
    needs:
      - update-version
    permissions:
      contents: write
      id-token: write

    if: github.event.inputs.publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.6.7'

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.update-version.outputs.VERSION }}
          release_name: ${{ needs.update-version.outputs.VERSION }}
          draft: false
          prerelease: false

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs:
      - update-version  # Wait for version bump to complete
      - build-and-publish  # Optional: wait for PyPI publish
    permissions:
      contents: read
      packages: write

    # Only run if publish is true (or remove condition to always build Docker)
    if: github.event.inputs.publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Need full history for version tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Use the NCSA org path
          images: ghcr.io/ncsa/water-timeseries-v2
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.update-version.outputs.VERSION }}
            type=raw,value=${{ needs.update-version.outputs.VERSION }}-${{ github.sha }}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Add build args if needed
          build-args: |
            VERSION=${{ needs.update-version.outputs.VERSION }}

  build-and-publish-docs:
    runs-on: ubuntu-latest
    needs:
      - update-version
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated from v2 to v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.6.7'

      - name: Set up Python
        run: uv python install

      - name: Get cache id
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material

      - name: Publish documentation
        run: uv run mike deploy --push --update-aliases ${{ needs.update-version.outputs.VERSION }} latest