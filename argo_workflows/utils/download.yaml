apiVersion: batch/v1
kind: Job
metadata:
  name: water-timeseries-download
  namespace: argo
  annotations:
    # Optional: Keep pod after completion for debugging
    workflows.argoproj.io/pod-keep: "OnCompletion"
spec:
  # Retry policy - adjust as needed
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400  # Clean up job after 24 hours

  # Pod template
  template:
    metadata:
      labels:
        job-type: data-download
        app: water-timeseries
    spec:
      restartPolicy: OnFailure

      imagePullSecrets:
      - name: ghcr-secret

      volumes:
      # Shared volume for data
      - name: water-timeseries-volume
        persistentVolumeClaim:
          claimName: argo-workflows-share

      # GCP credentials
      - name: gcp-creds
        secret:
          secretName: personal-gcp-creds
          items:
          - key: key.json
            path: application_default_credentials.json

      containers:
      - name: download-script
        # Use your existing container image
        image: ghcr.io/ncsa/water-timeseries-v2:ncsa
        imagePullPolicy: Always

        # Run the download script directly
        command: ["uv", "run"]
        args:
        - "python"
        - "-m"
        - "google_cloud_utils.download_from_cloud"
        - "pdg-storage-default"                    # source_bucket
        - "pdg-project-406720"                     # gcp_project
        - "water_timeseries_v2/data/"              # gcs_subfolder_path
        - "/data/water_time_series_v2/input"       # local_path

        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /root/.config/gcloud/application_default_credentials.json
        - name: PYTHONPATH
          value: /app  # Ensure Python can find the google_cloud_utils module

        volumeMounts:
        - name: gcp-creds
          mountPath: /root/.config/gcloud
          readOnly: true
        - name: water-timeseries-volume
          mountPath: /data

        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
            ephemeral-storage: "5Gi"
          limits:
            memory: "4Gi"
            cpu: "2"
            ephemeral-storage: "10Gi"