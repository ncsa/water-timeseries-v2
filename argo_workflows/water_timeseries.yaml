apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: water-timeseries-breakpoint-analysis
  namespace: argo
  annotations:
    workflows.argoproj.io/pod-keep: "OnCompletion"
spec:
  ttlStrategy:
    secondsAfterCompletion: 86400  # Keep for 1 day after completion
  entrypoint: main
  imagePullSecrets:
  - name: ghcr-secret
  volumes:
  - name: water-timeseries-volume
    persistentVolumeClaim:
      claimName: argo-workflows-share
  - name: gcp-creds
    secret:
      secretName: personal-gcp-creds
      items:
      - key: key.json
        path: application_default_credentials.json
  - name: earth-engine-creds
    secret:
      secretName: earth-engine-creds
      items:
      - key: credentials
        path: credentials
  - name: config-file
    configMap:
      name: water-series-configmap
      items:
      - key: config.yaml
        path: config.yaml
  templates:
  - name: main
    metadata:
      labels:
        long-running-job: "true"
    container:
      image: ghcr.io/ncsa/water-timeseries-v2:ncsa
      imagePullPolicy: Always
      resources:
        requests:
          memory: "16Gi"
          cpu: "4"
          ephemeral-storage: "10Gi"
        limits:
          memory: "16Gi"
          cpu: "4"
          ephemeral-storage: "20Gi"

      # Key change: Use uv run directly with specific script
      command: ["uv", "run"]
      args:
      - "water-timeseries"  # The script name
      - "breakpoint-analysis"
      - "--config-file"
      - "/app/config.yaml"

      # Alternative: If you want to run a different script
      # args:
      # - "your-other-script"
      # - "--your-flag"
      # - "value"

      env:
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /root/.config/gcloud/application_default_credentials.json
      - name: EARTHENGINE_TOKEN
        value: /root/.config/earthengine/credentials
      - name: EE_CLOUD_PROJECT
        value: "pdg-wg-workflow"
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: UV_CACHE_DIR
        value: /data/uv_cache
      - name: UV_NO_CACHE
        value: "0"

      volumeMounts:
      - name: gcp-creds
        mountPath: /root/.config/gcloud
        readOnly: true
      - name: earth-engine-creds
        mountPath: /root/.config/earthengine
        readOnly: true
      - name: water-timeseries-volume
        mountPath: /data
      - name: config-file
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true